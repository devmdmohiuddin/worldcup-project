<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Icon block (rounded square 64x64 at x=8 y=8) -->
  <g transform="translate(8 8)">
    <rect width="64" height="64" rx="14" fill="url(#iconBg)"/>

    <!-- Football -->
    <g transform="translate(32 32)">
      <circle r="18" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <polygon points="0,-7 6.65,-2.16 4.11,5.66 -4.11,5.66 -6.65,-2.16" fill="#0f172a"/>
      <line x1="0" y1="-7" x2="0" y2="-17" stroke="#0f172a" stroke-width="2"/>
      <line x1="6.65" y1="-2.16" x2="16.16" y2="-5.25" stroke="#0f172a" stroke-width="2"/>
      <line x1="4.11" y1="5.66" x2="9.99" y2="13.75" stroke="#0f172a" stroke-width="2"/>
      <line x1="-4.11" y1="5.66" x2="-9.99" y2="13.75" stroke="#0f172a" stroke-width="2"/>
      <line x1="-6.65" y1="-2.16" x2="-16.16" y2="-5.25" stroke="#0f172a" stroke-width="2"/>
    </g>

    <!-- Live dot -->
    <circle cx="51" cy="13" r="5" fill="#f97316"/>
    <circle cx="51" cy="13" r="2.2" fill="#ffffff"/>
  </g>

  <!-- Wordmark: "MatchHub" + ".live" -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800">
    <!-- "Match" in dark -->
    <text x="86" y="50" font-size="32" fill="#0f172a" letter-spacing="-0.5">Match</text>
    <!-- "Hub" in green -->
    <text x="186" y="50" font-size="32" fill="#22c55e" letter-spacing="-0.5">Hub</text>
    <!-- ".live" smaller, orange accent -->
    <text x="258" y="50" font-size="22" fill="#f97316" letter-spacing="-0.3" font-weight="600">.live</text>
  </g>

  <!-- Tagline -->
  <text x="86" y="68" font-family="'Inter', Arial, sans-serif" font-size="10" fill="#64748b" letter-spacing="2" font-weight="500">EVERY MATCH · EVERY MOMENT</text>
</svg>
