<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded square background with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Football (soccer ball) -->
  <g transform="translate(32 32)">
    <!-- Ball outline -->
    <circle r="18" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    <!-- Center pentagon -->
    <polygon points="0,-7 6.65,-2.16 4.11,5.66 -4.11,5.66 -6.65,-2.16"
             fill="#0f172a"/>
    <!-- 5 connecting lines from pentagon corners -->
    <line x1="0" y1="-7" x2="0" y2="-17" stroke="#0f172a" stroke-width="2"/>
    <line x1="6.65" y1="-2.16" x2="16.16" y2="-5.25" stroke="#0f172a" stroke-width="2"/>
    <line x1="4.11" y1="5.66" x2="9.99" y2="13.75" stroke="#0f172a" stroke-width="2"/>
    <line x1="-4.11" y1="5.66" x2="-9.99" y2="13.75" stroke="#0f172a" stroke-width="2"/>
    <line x1="-6.65" y1="-2.16" x2="-16.16" y2="-5.25" stroke="#0f172a" stroke-width="2"/>
  </g>

  <!-- Live dot (top-right) -->
  <circle cx="51" cy="13" r="5" fill="#f97316"/>
  <circle cx="51" cy="13" r="2.2" fill="#ffffff"/>
</svg>
