<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="MatchHub — World Cup 2026, every match, every moment">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Icon block -->
  <g transform="translate(80, 180)">
    <rect width="160" height="160" rx="36" fill="url(#iconBg)"/>
    <!-- Football -->
    <g transform="translate(80 80)">
      <circle r="46" fill="#ffffff" stroke="#0f172a" stroke-width="4"/>
      <polygon points="0,-18 17.12,-5.56 10.58,14.56 -10.58,14.56 -17.12,-5.56" fill="#0f172a"/>
      <line x1="0" y1="-18" x2="0" y2="-44" stroke="#0f172a" stroke-width="4"/>
      <line x1="17.12" y1="-5.56" x2="41.6" y2="-13.51" stroke="#0f172a" stroke-width="4"/>
      <line x1="10.58" y1="14.56" x2="25.72" y2="35.4" stroke="#0f172a" stroke-width="4"/>
      <line x1="-10.58" y1="14.56" x2="-25.72" y2="35.4" stroke="#0f172a" stroke-width="4"/>
      <line x1="-17.12" y1="-5.56" x2="-41.6" y2="-13.51" stroke="#0f172a" stroke-width="4"/>
    </g>
    <!-- Live dot -->
    <circle cx="128" cy="32" r="13" fill="#f97316"/>
    <circle cx="128" cy="32" r="5.5" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <text x="270" y="280" font-family="system-ui, sans-serif" font-size="96" font-weight="800" letter-spacing="-2">
    <tspan fill="#f1f5f9">Match</tspan><tspan fill="#4ade80">Hub</tspan>
  </text>
  <text x="270" y="335" font-family="system-ui, sans-serif" font-size="44" font-weight="600" fill="#fb923c">.live</text>

  <text x="80" y="430" font-family="system-ui, sans-serif" font-size="38" font-weight="500" fill="#94a3b8">World Cup 2026 — every match, every moment</text>

  <g transform="translate(80, 480)">
    <rect width="320" height="56" rx="28" fill="#16a34a"/>
    <text x="160" y="38" font-family="system-ui, sans-serif" font-size="22" font-weight="600" text-anchor="middle" fill="white">No gambling · No piracy</text>
  </g>
  <text x="1120" y="590" font-family="system-ui, sans-serif" font-size="22" font-weight="500" fill="#64748b" text-anchor="end">matchhub.live</text>
</svg>
