<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 240" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7c2"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="globeShine" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff8dc" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Globe (top) -->
  <ellipse cx="80" cy="46" rx="34" ry="38" fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="2"/>
  <ellipse cx="80" cy="46" rx="34" ry="38" fill="url(#globeShine)"/>
  <!-- Meridians -->
  <ellipse cx="80" cy="46" rx="34" ry="14" fill="none" stroke="#78350f" stroke-opacity="0.35" stroke-width="1.2"/>
  <ellipse cx="80" cy="46" rx="12" ry="38" fill="none" stroke="#78350f" stroke-opacity="0.35" stroke-width="1.2"/>
  <!-- Continent hint -->
  <path d="M64 38c4-3 10-4 14-1 5 3 6 9 3 13-4 5-12 4-15 0-2-4-3-9-2-12z"
        fill="#92400e" fill-opacity="0.35"/>
  <path d="M86 56c5 0 9 4 9 8s-4 6-8 5-7-5-6-9c0-2 2-4 5-4z"
        fill="#92400e" fill-opacity="0.3"/>

  <!-- Collar connecting globe to figures -->
  <path d="M62 78c5 6 31 6 36 0v6c-4 6-32 6-36 0z"
        fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="1.5"/>

  <!-- Two figures supporting the globe (sculpted curving forms) -->
  <path d="M64 88c-10 14-14 28-12 44 2 14 10 22 24 24 4-4 6-12 4-18-4-12-6-22-4-32 2-10 0-16-12-18z"
        fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="2"/>
  <path d="M96 88c10 14 14 28 12 44-2 14-10 22-24 24-4-4-6-12-4-18 4-12 6-22 4-32-2-10 0-16 12-18z"
        fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="2"/>
  <!-- Inner sculpted shadows -->
  <path d="M70 96c-6 12-8 26-4 38 2 6 8 12 14 14"
        fill="none" stroke="#92400e" stroke-opacity="0.45" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M90 96c6 12 8 26 4 38-2 6-8 12-14 14"
        fill="none" stroke="#92400e" stroke-opacity="0.45" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Mid stem -->
  <rect x="72" y="154" width="16" height="14" rx="2" fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="1.5"/>
  <line x1="72" y1="161" x2="88" y2="161" stroke="#92400e" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Pedestal (octagonal) -->
  <path d="M54 170h52l-4 36H58z"
        fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="2"/>
  <line x1="58" y1="184" x2="102" y2="184" stroke="#92400e" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="60" y1="196" x2="100" y2="196" stroke="#92400e" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Bottom base -->
  <rect x="48" y="206" width="64" height="10" rx="2" fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="1.5"/>

  <!-- FIFA WORLD CUP plate -->
  <rect x="60" y="218" width="40" height="12" rx="2" fill="#7c2d12" stroke="url(#goldEdge)" stroke-width="1"/>
  <text x="80" y="227" font-family="system-ui, sans-serif" font-size="7" font-weight="700"
        text-anchor="middle" fill="#fde68a" letter-spacing="0.5">FIFA</text>
</svg>
